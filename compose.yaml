services:
  caddy:
    # Use fixed version tag in production!
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # - ./conf:/etc/caddy
      - ./public:/srv
      - caddy_data:/data
      # - caddy_config:/config

volumes:
  caddy_data:
  # caddy_config:

