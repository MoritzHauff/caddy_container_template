services:
  caddy:
    image: caddy:latest       # Use fixed version tag instead of latest in production!
    restart: unless-stopped   # Restart this service unless container is stopped.
    cap_add:
      - NET_ADMIN             # For ACME/DNS or QUIC (optional) - give Caddy permission to modify network stack settings.
    ports:
      - "80:80"               # Map HTTP port
      - "443:443"             # Map HTTPS port
      - "443:443/udp"         # For HTTP/3
    environment:
      - DOMAIN=${DOMAIN:-localhost}      # Default to 'localhost' if not set
      - GITHUB_REPO=${GITHUB_REPO:-MoritzHauff/caddy_container_template}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}   # Optional: GitHub token (for private repos)
    volumes:
      - caddy_data:/data      # Persist TLS certificates
      - caddy_config:/config  # Persist Caddy config
      - $PWD/conf:/etc/caddy  # Don't mount Caddy file directly https://hub.docker.com/_/caddy#basic-usage
      # - $PWD/public:/srv    # You could mount a local directory to provide the site data
      # But instead donwload a website from a private or public github repo
    command: >
      sh -c '
        apk add --no-cache git  # Install Git (Alpine-based image)

        echo "TOKEN=[$$GITHUB_TOKEN]"

        echo "REPO=$$GITHUB_REPO"

        if [ -n "$$GITHUB_TOKEN" ]; then
          echo "Using access token to clone (private) repo."
          git clone https://$$GITHUB_TOKEN@github.com/$$GITHUB_REPO.git /repo
        else
          echo "Clone public repo without access token."
          git clone https://github.com/$$GITHUB_REPO.git /repo
        fi

        # remove /srv directory
        rm -r /srv

        # link public site from repo to /srv
        ln -s /repo/public /srv

        echo "Serving on domain: $$DOMAIN"

        exec caddy run --config /etc/caddy/Caddyfile
      '
    networks:
      - caddy_net

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy_net:
    driver: bridge

